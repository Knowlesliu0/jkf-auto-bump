<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tapo 攝影機即時監控</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background">
        <div class="blob shape1"></div>
        <div class="blob shape2"></div>
        <div class="blob shape3"></div>
    </div>

    <div class="container">
        <header class="header frosted-glass">
            <div class="logo">
                <i class="fa-solid fa-camera"></i>
                <h1>Tapo 監控系統</h1>
            </div>
            <div class="status">
                <span class="status-indicator"></span>
                <span id="connection-status">連線中...</span>
            </div>
        </header>

        <main class="main-content">
            <div class="video-wrapper frosted-glass">
                <div class="video-header">
                    <h2><i class="fa-solid fa-video"></i> 客廳攝影機 (Stream 1)</h2>
                    <div class="controls">
                        <button id="fullscreen-btn" class="icon-btn" title="全螢幕">
                            <i class="fa-solid fa-expand"></i>
                        </button>
                    </div>
                </div>

                <div class="canvas-container">
                    <canvas id="video-canvas"></canvas>
                    <div id="loading-overlay" class="overlay">
                        <div class="spinner"></div>
                        <p>載入影像中...</p>
                    </div>
                </div>
            </div>

            <aside class="sidebar frosted-glass">
                <div class="sidebar-section">
                    <h3><i class="fa-solid fa-circle-info"></i> 系統狀態</h3>
                    <ul class="info-list">
                        <li>
                            <span class="label">解析度</span>
                            <span class="value" id="info-resolution">未知</span>
                        </li>
                        <li>
                            <span class="label">幀率</span>
                            <span class="value">~30 FPS</span>
                        </li>
                        <li>
                            <span class="label">後端連線</span>
                            <span class="value text-success">已建立</span>
                        </li>
                    </ul>
                </div>
            </aside>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/gh/phoboslab/jsmpeg@master/jsmpeg.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const canvas = document.getElementById('video-canvas');
            const statusText = document.getElementById('connection-status');
            const statusIndicator = document.querySelector('.status-indicator');
            const loadingOverlay = document.getElementById('loading-overlay');
            const fullscreenBtn = document.getElementById('fullscreen-btn');

            // 建立 WebSocket 連線與 JSMpeg 播放器
            const wsUrl = `ws://${window.location.hostname}:9999/`;

            try {
                const player = new JSMpeg.Player(wsUrl, {
                    canvas: canvas,
                    audio: false,
                    videoBufferSize: 1024 * 1024 * 4, // 增加緩衝區
                    disableGl: false, // 優先嘗試 WebGL 加速
                    onSourceEstablished: () => {
                        console.log('連線成功');
                        statusText.textContent = '已連線';
                        statusIndicator.classList.add('connected');
                        loadingOverlay.style.display = 'none';
                    },
                    onSourceCompleted: () => {
                        console.log('來源完成');
                        statusText.textContent = '停止連線';
                        statusIndicator.classList.remove('connected');
                        statusIndicator.style.background = '#f59e0b';
                    }
                });

                // 定期更新解析度資訊
                setInterval(() => {
                    const infoResolution = document.getElementById('info-resolution');
                    if (canvas.width > 0 && canvas.height > 0) {
                        infoResolution.textContent = `${canvas.width} x ${canvas.height}`;
                    }
                }, 1000);
            } catch (error) {
                console.error('初始化播放器失敗:', error);
                statusText.textContent = '連線失敗';
                statusIndicator.style.background = '#ff4d4d';
            }

            // 全螢幕控制
            fullscreenBtn.addEventListener('click', () => {
                if (!document.fullscreenElement) {
                    if (canvas.requestFullscreen) {
                        canvas.requestFullscreen();
                    } else if (canvas.webkitRequestFullscreen) {
                        canvas.webkitRequestFullscreen();
                    }
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    }
                }
            });
        });
    </script>
</body>

</html>
