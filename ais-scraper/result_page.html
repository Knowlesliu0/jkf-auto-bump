        function funCheckAll_click() {
            //點擊車體評價
            $("input[id*='Q_ALL_OUTSIDE_POINT']").click(function () {
                if ($("input[id*='Q_ALL_OUTSIDE_POINT']").prop("checked")) {//如果全選按鈕有被選擇的話（被選擇是true）
                    $("input[id*='Q_OUTSIDE_POINT']").each(function () {
                        $(this).prop("checked", true);//把所有的核取方框的property都變成勾選
                    })
                } else {
                    $("input[id*='Q_OUTSIDE_POINT']").each(function () {
                        $(this).prop("checked", false);//把所有的核方框的property都取消勾選
                    })
                }
            })

            $("input[id*='Q_OUTSIDE_POINT']").click(function () {
                var flag = true;
                $("input[id*='Q_OUTSIDE_POINT']").each(function () {
                    if ($(this).prop('checked') == false) {
                        flag = false;
                        $("input[id*='Q_ALL_OUTSIDE_POINT']").prop("checked", false);
                    }
                    if (flag == true)
                        $("input[id*='Q_ALL_OUTSIDE_POINT']").prop("checked", true);
                })

            })
        }
